<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redlands Coast Intelligence Dashboard</title>

<style>
:root{
--ocean:#0A3A5C;
--teal:#1F8A89;
--light:#A3D5D5;
--bg:#F7F5F0;
--white:#fff;
--text:#2C3E50;
}

*{box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{margin:0;background:var(--white);color:var(--text);line-height:1.5}

header{
background:var(--bg);
padding:30px 20px;
text-align:center;
border-bottom:4px solid var(--teal)
}

h1{margin:0;color:var(--ocean)}
.subtitle{color:var(--teal)}

.container{max-width:1100px;margin:30px auto;padding:0 15px}

.controls{
display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:25px
}

button{
padding:10px 18px;border-radius:20px;
border:2px solid var(--ocean);
background:#fff;color:var(--ocean);
font-weight:600;cursor:pointer
}

button.active{background:var(--ocean);color:#fff}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:18px
}

.card{
background:var(--bg);
padding:18px;
border-radius:14px;
box-shadow:0 3px 8px rgba(0,0,0,.05)
}

.card h3{margin-top:0;color:var(--ocean)}

.metric{
font-size:2rem;font-weight:700;color:var(--teal)
}

.label{font-size:.85rem;color:#555}

.progress{
height:10px;background:#ddd;border-radius:5px;margin:6px 0
}

.fill{height:100%;background:var(--teal)}

.ocean{background:var(--ocean)}
.light{background:var(--light)}

ul{padding-left:18px;margin:10px 0}

</style>
</head>

<body>

<header>
<h1>Redlands Coast Intelligence</h1>
<p class="subtitle">Economic System • Reality Layer • Strategic Signals</p>
</header>

<div class="container">

<div class="controls">
<button class="active" onclick="view('core')">Core</button>
<button onclick="view('economy')">Economy</button>
<button onclick="view('system')">System Stress</button>
<button onclick="view('islands')">Islands</button>
<button onclick="view('projects')">Projects</button>
</div>

<div class="grid" id="dashboard"></div>

</div>

<script>

const data = {

core: [
{title:"Population",metric:"170,225",label:"Residents (2024)"},
{title:"Growth Rate",metric:"2.05%",label:"Annual"},
{title:"GRP",metric:"$8B",label:"Gross Regional Product"},
{title:"Jobs",metric:"55,454",label:"Local Employment"},
{title:"Businesses",metric:"12,821",label:"Active"},
{title:"Median Age",metric:"43",label:"Older demographic skew"}
],

economy: [
{title:"Health Sector",metric:"$1.02B",label:"Value Add"},
{title:"Construction",metric:"$2.5B",label:"Total Output"},
{title:"Retail",metric:"$553M",label:"Value Add"},
{title:"Manufacturing",metric:"$716M",label:"Exports"},
{title:"Tourism",metric:"$618M",label:"Value Add"},
{title:"Knowledge Economy",metric:"$656M",label:"PSTS + Finance"}
],

system: [
{title:"Job Self-Containment",metric:"42.3%",label:"Low retention"},
{title:"Outbound Workers",metric:"4,000+",label:"Daily commuters"},
{title:"Visitor Spend",metric:"64%",label:"External transactions"},
{title:"Youth Challenge",metric:"High",label:"Retention issue"},
{title:"Tourism Constraint",metric:"Supply",label:"Accommodation limits"},
{title:"Skills Shortage",metric:"Growing",label:"Construction + services"}
],

islands: [
{title:"Island Population",metric:"12,000+",label:"Distributed communities"},
{title:"Transport Dependency",metric:"High",label:"Barge + ferry reliance"},
{title:"Local Jobs",metric:"Limited",label:"Economic leakage"},
{title:"Costs",metric:"High",label:"Freight + labour"},
{title:"Opportunity",metric:"Circular Economy",label:"Local resilience"},
{title:"Tourism Potential",metric:"High",label:"Underdeveloped"}
],

projects: [
{title:"Birkdale Precinct",metric:"Olympics",label:"Whitewater centre"},
{title:"Capalaba Revitalisation",metric:"$250M",label:"Urban centre"},
{title:"Toondah Harbour",metric:"Gateway",label:"Tourism + ferry"},
{title:"Weinam Creek",metric:"700 jobs",label:"Transport hub"},
{title:"Dunwich Upgrade",metric:"$41M",label:"Island connectivity"},
{title:"Cleveland Revitalisation",metric:"$12M+",label:"Urban renewal"}
]

}

function view(type){
document.querySelectorAll("button").forEach(b=>b.classList.remove("active"))
event.target.classList.add("active")

const container = document.getElementById("dashboard")
container.innerHTML=""

data[type].forEach(item=>{
container.innerHTML += `
<div class="card">
<h3>${item.title}</h3>
<div class="metric">${item.metric}</div>
<div class="label">${item.label}</div>
</div>
`
})
}

view('core')

</script>

</body>
</html>
